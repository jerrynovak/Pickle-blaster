<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Pickle Blaster</title>
  <style>
    :root {
      --ink: #17351d;
      --cream: #fff4c9;
      --lime: #b9ef3d;
      --green: #37a94a;
      --dark-green: #176b38;
      --pink: #ff5c8a;
      --yellow: #ffd84a;
      --sky: #95e8ff;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: "Arial Rounded MT Bold", "Trebuchet MS", system-ui, sans-serif;
      color: var(--ink);
      background: #68c5ee;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    button { font: inherit; }

    #game {
      --ground-rise: 0px;
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 420px;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 14% 14%, rgba(255,255,255,.95) 0 3%, transparent 3.2%),
        radial-gradient(circle at 19% 14%, rgba(255,255,255,.95) 0 4%, transparent 4.2%),
        radial-gradient(circle at 85% 22%, rgba(255,255,255,.8) 0 4%, transparent 4.2%),
        linear-gradient(#76dafa 0 72%, #d7ef72 72% 100%);
      cursor: crosshair;
    }

    #game::before {
      content: "";
      position: absolute;
      z-index: -1;
      left: 0;
      right: 0;
      bottom: 0;
      height: calc(28% + var(--ground-rise));
      background:
        radial-gradient(ellipse at 10% 20%, #81c74f 0 34%, transparent 35%),
        radial-gradient(ellipse at 45% 20%, #72b845 0 37%, transparent 38%),
        radial-gradient(ellipse at 80% 20%, #8acb4a 0 36%, transparent 37%),
        linear-gradient(#78bd43, #4b8d32);
      border-top: 8px solid rgba(255,255,255,.28);
    }

    #game::after {
      content: "";
      position: absolute;
      z-index: 1;
      left: 0;
      right: 0;
      bottom: var(--ground-rise);
      height: 34px;
      background: repeating-linear-gradient(90deg, #d69a46 0 34px, #c28437 34px 39px);
      border-top: 8px solid #8a552b;
      box-shadow: 0 -5px 0 rgba(255,255,255,.25);
    }

    .hud {
      position: absolute;
      z-index: 20;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      pointer-events: none;
    }

    .pill {
      min-width: 105px;
      padding: 8px 14px 9px;
      border: 4px solid var(--ink);
      border-radius: 18px;
      background: var(--cream);
      box-shadow: 0 5px 0 var(--ink);
      text-align: center;
      line-height: 1;
    }

    .label {
      display: block;
      margin-bottom: 5px;
      font-size: clamp(10px, 2.4vw, 13px);
      letter-spacing: .11em;
      text-transform: uppercase;
    }

    #score {
      font-size: clamp(24px, 6vw, 35px);
      color: var(--dark-green);
    }

    #crowns {
      display: flex;
      gap: 3px;
      min-height: 31px;
      align-items: center;
      justify-content: center;
      font-size: clamp(21px, 5vw, 29px);
      filter: drop-shadow(0 2px 0 #c77c19);
    }

    #crowns .lost {
      opacity: .18;
      filter: grayscale(1);
      transform: scale(.82);
    }

    .pickle {
      --w: 55px;
      --rot: 0deg;
      position: absolute;
      z-index: 5;
      top: 0;
      left: 0;
      width: var(--w);
      height: calc(var(--w) * 1.75);
      border: max(3px, calc(var(--w) * .055)) solid #144d2c;
      border-radius: 48% 52% 44% 56% / 21% 23% 77% 79%;
      background:
        radial-gradient(circle at 30% 25%, #d7f15b 0 4%, transparent 4.7%),
        radial-gradient(circle at 72% 48%, #d7f15b 0 4.5%, transparent 5.2%),
        radial-gradient(circle at 28% 70%, #d7f15b 0 4%, transparent 4.7%),
        radial-gradient(circle at 66% 82%, #d7f15b 0 3.6%, transparent 4.3%),
        linear-gradient(100deg, #277a3b 0 15%, #48b848 25% 55%, #24833c 72%, #195e33);
      box-shadow:
        inset 7px 0 0 rgba(255,255,255,.12),
        inset -6px 0 0 rgba(0,0,0,.12),
        0 6px 0 rgba(23,53,29,.25);
      transform: translate3d(var(--x), var(--y), 0) rotate(var(--rot));
      transform-origin: center;
      will-change: transform;
      cursor: crosshair;
      -webkit-tap-highlight-color: transparent;
    }

    .pickle::before,
    .pickle::after {
      content: "";
      position: absolute;
      top: 35%;
      width: 12%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #102d1b;
      box-shadow: inset 2px 2px 0 rgba(255,255,255,.55);
    }

    .pickle::before { left: 23%; }
    .pickle::after { right: 23%; }

    .mouth {
      position: absolute;
      left: 37%;
      top: 52%;
      width: 26%;
      height: 11%;
      border: max(2px, calc(var(--w) * .035)) solid #102d1b;
      border-top: 0;
      border-radius: 0 0 20px 20px;
    }

    .rascal {
      background:
        radial-gradient(circle at 30% 25%, #80b84d 0 4%, transparent 4.7%),
        radial-gradient(circle at 72% 48%, #80b84d 0 4.5%, transparent 5.2%),
        radial-gradient(circle at 28% 70%, #80b84d 0 4%, transparent 4.7%),
        radial-gradient(circle at 66% 82%, #80b84d 0 3.6%, transparent 4.3%),
        linear-gradient(100deg, #0e4229 0 15%, #17693a 25% 55%, #0d4c2e 72%, #082f20);
      filter: drop-shadow(0 0 7px rgba(255, 92, 138, .38));
    }

    .rascal .mouth::after {
      content: "";
      position: absolute;
      z-index: 1;
      top: 45%;
      left: 19%;
      width: 62%;
      height: 0;
      border: max(2px, calc(var(--w) * .025)) solid #8c2147;
      border-top: 0;
      border-radius: 0 0 60% 60%;
      background: #ff6b9a;
      opacity: 0;
      transform-origin: top;
      transition: height .12s ease-out, opacity .08s;
    }

    .rascal.tongue-out .mouth::after {
      height: calc(var(--w) * .42);
      opacity: 1;
      animation: tongue-wag .28s ease-in-out infinite alternate;
    }

    .friendly {
      border-color: #416728;
      background:
        radial-gradient(circle at 30% 25%, #3f8e3d 0 4%, transparent 4.7%),
        radial-gradient(circle at 72% 48%, #3f8e3d 0 4.5%, transparent 5.2%),
        radial-gradient(circle at 28% 70%, #3f8e3d 0 4%, transparent 4.7%),
        radial-gradient(circle at 66% 82%, #3f8e3d 0 3.6%, transparent 4.3%),
        linear-gradient(100deg, #d7b629 0 15%, #ffe45b 25% 55%, #e1bd2d 72%, #ba9420);
      filter: drop-shadow(0 0 8px rgba(255, 235, 95, .7));
    }

    .friendly-crown {
      position: absolute;
      z-index: 3;
      top: calc(var(--w) * -.42);
      left: 50%;
      color: var(--yellow);
      font-size: calc(var(--w) * .58);
      line-height: 1;
      text-shadow:
        -2px -2px 0 #8a552b,
        2px -2px 0 #8a552b,
        -2px 2px 0 #8a552b,
        2px 2px 0 #8a552b;
      transform: translateX(-50%) rotate(-6deg);
      pointer-events: none;
    }

    .sweet {
      border-color: #8f2851;
      background:
        radial-gradient(circle at 30% 25%, #3c9d49 0 4%, transparent 4.7%),
        radial-gradient(circle at 72% 48%, #3c9d49 0 4.5%, transparent 5.2%),
        radial-gradient(circle at 28% 70%, #3c9d49 0 4%, transparent 4.7%),
        radial-gradient(circle at 66% 82%, #3c9d49 0 3.6%, transparent 4.3%),
        linear-gradient(100deg, #d83f78 0 15%, #ff7aa8 25% 55%, #e74f86 72%, #ad315f);
      filter: drop-shadow(0 0 10px rgba(255, 92, 138, .8));
    }

    .sweet .mouth {
      left: 34%;
      width: 32%;
      height: 9%;
      border: max(3px, calc(var(--w) * .05)) solid #c51645;
      border-top: max(2px, calc(var(--w) * .025)) solid #ef3e67;
      border-radius: 50%;
      background: #ff6b8f;
      transform: rotate(-4deg);
    }

    .sweet .friendly-crown {
      color: #ff5caa;
      text-shadow:
        -2px -2px 0 #8f2851,
        2px -2px 0 #8f2851,
        -2px 2px 0 #8f2851,
        2px 2px 0 #8f2851;
    }

    .fuse-pickle {
      border-color: #050805;
      background:
        radial-gradient(circle at 30% 25%, #52b84f 0 4%, transparent 4.7%),
        radial-gradient(circle at 72% 48%, #52b84f 0 4.5%, transparent 5.2%),
        radial-gradient(circle at 28% 70%, #52b84f 0 4%, transparent 4.7%),
        radial-gradient(circle at 66% 82%, #52b84f 0 3.6%, transparent 4.3%),
        linear-gradient(100deg, #050805 0 15%, #202820 25% 55%, #0b100c 72%, #000);
      filter: drop-shadow(0 0 9px rgba(255, 116, 42, .7));
    }

    .fuse {
      position: absolute;
      z-index: 4;
      top: calc(var(--w) * -.48);
      left: 52%;
      width: calc(var(--w) * .36);
      height: calc(var(--w) * .52);
      border-top: max(3px, calc(var(--w) * .055)) solid #49331f;
      border-left: max(3px, calc(var(--w) * .055)) solid #49331f;
      border-radius: 80% 0 0;
      transform: rotate(10deg);
      pointer-events: none;
    }

    .fuse::after {
      content: "";
      position: absolute;
      top: calc(var(--w) * -.18);
      left: calc(var(--w) * -.16);
      width: calc(var(--w) * .25);
      aspect-ratio: 1;
      border-radius: 50%;
      background: #fff6a6;
      box-shadow:
        0 0 0 calc(var(--w) * .08) #ffb52e,
        0 0 calc(var(--w) * .28) calc(var(--w) * .1) #ff5b22;
      animation: fuse-spark .16s ease-in-out infinite alternate;
    }

    @keyframes fuse-spark {
      from { scale: .72; rotate: -12deg; }
      to { scale: 1.18; rotate: 12deg; }
    }

    .jakey {
      border-color: #246888;
      background:
        radial-gradient(circle at 30% 25%, #ffe15a 0 4%, transparent 4.7%),
        radial-gradient(circle at 72% 48%, #ffe15a 0 4.5%, transparent 5.2%),
        radial-gradient(circle at 28% 70%, #ffe15a 0 4%, transparent 4.7%),
        radial-gradient(circle at 66% 82%, #ffe15a 0 3.6%, transparent 4.3%),
        linear-gradient(100deg, #5dbce0 0 15%, #9ee8ff 25% 55%, #61c5e9 72%, #348cae);
      filter: drop-shadow(0 0 9px rgba(91, 255, 114, .75));
    }

    .jakey-light {
      position: absolute;
      z-index: 4;
      top: calc(var(--w) * -.4);
      left: 50%;
      width: calc(var(--w) * .48);
      height: calc(var(--w) * .4);
      border: max(3px, calc(var(--w) * .05)) solid #064d1d;
      border-radius: 50% 50% 20% 20%;
      background: #39ff14;
      box-shadow:
        inset 0 0 calc(var(--w) * .12) #e8ffe0,
        0 0 calc(var(--w) * .5) calc(var(--w) * .2) rgba(57, 255, 20, .95);
      transform: translateX(-50%);
      animation: jakey-light .34s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes jakey-light {
      from {
        filter: brightness(.65);
        box-shadow:
          inset 0 0 calc(var(--w) * .08) #e8ffe0,
          0 0 calc(var(--w) * .25) calc(var(--w) * .08) rgba(57, 255, 20, .55);
      }
      to {
        filter: brightness(1.45);
        box-shadow:
          inset 0 0 calc(var(--w) * .16) #fff,
          0 0 calc(var(--w) * .8) calc(var(--w) * .34) rgba(57, 255, 20, 1);
      }
    }

    @keyframes tongue-wag {
      from { transform: rotate(-9deg); }
      to { transform: rotate(9deg); }
    }

    .giant {
      background:
        radial-gradient(circle at 26% 22%, #e7fb67 0 3.5%, transparent 4.2%),
        radial-gradient(circle at 70% 42%, #e7fb67 0 4%, transparent 4.7%),
        radial-gradient(circle at 34% 66%, #e7fb67 0 4%, transparent 4.7%),
        radial-gradient(circle at 72% 79%, #e7fb67 0 3.5%, transparent 4.2%),
        repeating-linear-gradient(98deg, transparent 0 18%, rgba(20,80,42,.18) 19% 23%, transparent 24% 35%),
        linear-gradient(100deg, #327f3a, #6bc840 45%, #24713b);
      filter: drop-shadow(0 0 9px #ecff60);
    }

    .sunglasses {
      position: absolute;
      z-index: 3;
      top: 38%;
      left: 13%;
      width: 74%;
      height: max(4px, calc(var(--w) * .07));
      border-radius: 8px;
      background: #5b321c;
      pointer-events: none;
    }

    .sunglasses::before,
    .sunglasses::after {
      content: "";
      position: absolute;
      top: calc(var(--w) * -.11);
      width: 38%;
      height: calc(var(--w) * .3);
      border: max(3px, calc(var(--w) * .045)) solid #5b321c;
      border-radius: 26% 26% 46% 46%;
      background: linear-gradient(145deg, #9b6a42 0 28%, #5a321f 31% 100%);
      box-shadow: inset 3px 3px 0 rgba(255,255,255,.18);
    }

    .sunglasses::before { left: 0; }
    .sunglasses::after { right: 0; }

    .barrel {
      border-color: #5a311d;
      border-radius: 22% 24% 26% 25% / 15% 15% 85% 85%;
      background:
        linear-gradient(90deg, rgba(255,255,255,.16), transparent 18% 82%, rgba(0,0,0,.18)),
        repeating-linear-gradient(90deg, #8b542b 0 15%, #6f3e21 15% 19%, #a76b35 19% 35%),
        linear-gradient(#c27a3a, #70401f);
      filter: drop-shadow(0 0 12px rgba(111, 62, 33, .8));
    }

    .barrel::before,
    .barrel::after,
    .barrel .mouth {
      display: none;
    }

    .barrel-band {
      position: absolute;
      z-index: 2;
      left: -7%;
      width: 114%;
      height: max(7px, calc(var(--w) * .11));
      border: max(2px, calc(var(--w) * .025)) solid #2f241e;
      border-radius: 50%;
      background: linear-gradient(#d8d1be, #766d61);
      pointer-events: none;
    }

    .barrel-band.top { top: 12%; }
    .barrel-band.middle { top: 45%; }
    .barrel-band.bottom { top: 78%; }

    .barrel-label {
      position: absolute;
      z-index: 3;
      left: 50%;
      top: 31%;
      padding: 3px 8px;
      border: max(2px, calc(var(--w) * .025)) solid #2f241e;
      border-radius: 9px;
      background: var(--cream);
      color: #5a311d;
      font-size: max(11px, calc(var(--w) * .18));
      font-weight: 900;
      transform: translateX(-50%) rotate(-4deg);
      pointer-events: none;
    }

    .splat {
      position: absolute;
      z-index: 8;
      width: 90px;
      height: 90px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: splat .42s ease-out forwards;
    }

    .splat::before {
      content: "";
      position: absolute;
      inset: 22%;
      border-radius: 44% 56% 51% 49%;
      background: var(--lime);
      box-shadow:
        -30px 5px 0 -9px var(--lime),
        31px -2px 0 -11px var(--lime),
        -13px -30px 0 -12px var(--lime),
        15px 31px 0 -11px var(--lime);
    }

    .splat b {
      position: absolute;
      inset: 28%;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-size: 18px;
      transform: rotate(-8deg);
    }

    @keyframes splat {
      from { opacity: 1; scale: .35; rotate: -15deg; }
      70% { opacity: 1; scale: 1.18; }
      to { opacity: 0; scale: 1.4; rotate: 9deg; }
    }

    .blast-ring {
      --blast-diameter: 300px;
      position: absolute;
      z-index: 9;
      width: var(--blast-diameter);
      height: var(--blast-diameter);
      border: 12px solid var(--yellow);
      border-radius: 50%;
      background: rgba(255, 92, 138, .65);
      box-shadow: 0 0 0 10px rgba(255,255,255,.8);
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: blast-ring .48s ease-out forwards;
    }

    @keyframes blast-ring {
      from { opacity: 1; scale: .15; }
      to { opacity: 0; scale: 1; }
    }

    .ground-bump {
      position: absolute;
      z-index: 12;
      bottom: calc(20px + var(--ground-rise));
      transform: translateX(-50%);
      font-size: clamp(28px, 8vw, 48px);
      font-weight: 900;
      color: #fff;
      text-shadow: 3px 3px 0 var(--ink);
      pointer-events: none;
      animation: bump .65s ease-out forwards;
    }

    @keyframes bump {
      from { opacity: 1; translate: 0 10px; scale: .6; }
      to { opacity: 0; translate: 0 -80px; scale: 1.15; }
    }

    #toast {
      position: absolute;
      z-index: 18;
      top: 23%;
      left: 50%;
      width: min(90%, 600px);
      transform: translateX(-50%);
      color: #fff;
      text-align: center;
      font-size: clamp(24px, 7vw, 54px);
      font-weight: 900;
      text-shadow: 4px 4px 0 var(--ink);
      pointer-events: none;
      opacity: 0;
    }

    #toast.show { animation: toast 1.55s ease-in-out; }

    @keyframes toast {
      0%, 100% { opacity: 0; transform: translate(-50%, -20px) scale(.8); }
      14%, 76% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    }

    .panel {
      position: absolute;
      z-index: 50;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(25, 76, 54, .38);
      backdrop-filter: blur(4px);
    }

    .card {
      width: min(92vw, 500px);
      padding: clamp(20px, 5vw, 38px);
      border: 6px solid var(--ink);
      border-radius: 30px;
      background: var(--cream);
      box-shadow: 0 12px 0 var(--ink);
      text-align: center;
      transform: rotate(-1deg);
    }

    h1 {
      margin: 0;
      color: var(--green);
      font-size: clamp(42px, 12vw, 76px);
      line-height: .82;
      letter-spacing: -.06em;
      text-transform: uppercase;
      -webkit-text-stroke: 2px var(--ink);
      text-shadow: 5px 5px 0 var(--yellow);
    }

    h1 span {
      display: block;
      color: var(--pink);
      font-size: .72em;
      letter-spacing: .02em;
    }

    #gameOverPanel h1 {
      font-size: clamp(36px, 10vw, 64px);
      letter-spacing: -.04em;
      white-space: nowrap;
    }

    #gameOverPanel h1 span {
      display: inline;
      font-size: 1em;
    }

    .mascot {
      display: inline-block;
      margin: 12px 0 5px;
      font-size: clamp(55px, 16vw, 88px);
      filter: drop-shadow(4px 5px 0 rgba(23,53,29,.25));
      transform: rotate(12deg);
    }

    .card p {
      margin: 8px auto 17px;
      max-width: 380px;
      font-size: clamp(15px, 4vw, 20px);
      line-height: 1.35;
    }

    .version {
      margin-top: 14px;
      color: var(--dark-green);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .16em;
      opacity: .7;
      text-transform: uppercase;
    }

    .big-score {
      margin: 10px 0 2px;
      color: var(--dark-green);
      font-size: clamp(30px, 8vw, 48px);
    }

    .high-score {
      margin: 8px 0 14px;
      color: #9a6422;
      font-size: clamp(16px, 4vw, 21px);
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .high-score.new-record {
      color: var(--cream);
      background: var(--dark-green);
      border-radius: 10px;
      box-shadow: 0 0 0 4px var(--cream), 0 0 0 8px var(--dark-green);
      animation: record-pop .7s ease-in-out infinite alternate;
    }

    #scorePill.record-flash {
      color: var(--cream);
      background: var(--ink);
      border-color: var(--cream);
      box-shadow: 0 5px 0 var(--cream), 0 0 0 4px var(--ink);
    }

    #scorePill.record-flash #score { color: var(--yellow); }

    @keyframes record-pop {
      from { transform: scale(1) rotate(-1deg); }
      to { transform: scale(1.08) rotate(1deg); }
    }

    .action {
      min-width: 190px;
      min-height: 58px;
      padding: 12px 25px;
      border: 4px solid var(--ink);
      border-radius: 18px;
      background: var(--pink);
      color: white;
      box-shadow: 0 7px 0 var(--ink);
      font-size: clamp(20px, 5vw, 27px);
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform .08s, box-shadow .08s;
      -webkit-tap-highlight-color: transparent;
    }

    .action:hover { background: #ff3974; transform: translateY(-2px); }
    .action:active { transform: translateY(5px); box-shadow: 0 2px 0 var(--ink); }
    .action:focus-visible { outline: 5px solid white; outline-offset: 4px; }
    .hidden { display: none; }

    #mute {
      position: absolute;
      z-index: 30;
      right: max(14px, env(safe-area-inset-right));
      bottom: max(48px, calc(env(safe-area-inset-bottom) + 44px));
      width: 48px;
      height: 48px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background: var(--cream);
      box-shadow: 0 4px 0 var(--ink);
      font-size: 22px;
      cursor: pointer;
    }

    @media (max-height: 520px) {
      .card { padding: 13px 22px; }
      .mascot { display: none; }
      .card p { margin: 6px auto 10px; }
      h1 { font-size: 44px; }
      .action { min-height: 48px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .splat, .ground-bump, #toast.show { animation-duration: .15s; }
    }
  </style>
</head>
<body>
  <main id="game" aria-label="Pickle Blaster game area">
    <div class="hud" aria-live="polite">
      <div id="scorePill" class="pill"><span class="label">Pickle Points</span><strong id="score">0</strong></div>
      <div class="pill"><span class="label">Royal Pickle Guard</span><div id="crowns" aria-label="3 crowns"></div></div>
    </div>

    <div id="toast" aria-live="polite"></div>
    <button id="mute" type="button" aria-label="Mute sound" title="Toggle sound">🔊</button>

    <section id="startPanel" class="panel">
      <div class="card">
        <h1>Pickle <span>Blaster!</span></h1>
        <div class="mascot" aria-hidden="true">🥒💥</div>
        <p>Tap the tumbling pickles before they bonk the royal picnic. You have <strong>3 crowns</strong>. Guard them with honor. And snacks.</p>
        <div id="startHighScore" class="high-score">High Score: 0</div>
        <button id="startButton" class="action" type="button">Start Blasting</button>
        <div class="version">Version 0.95</div>
      </div>
    </section>

    <section id="gameOverPanel" class="panel hidden" aria-live="assertive">
      <div class="card">
        <h1>BLASTED <span>!</span></h1>
        <div class="mascot" aria-hidden="true">👑🥒</div>
        <div id="finalScore" class="big-score">0 points</div>
        <div id="finalHighScore" class="high-score">High Score: 0</div>
        <p id="gameOverMessage">The royal picnic has been pickled!</p>
        <button id="restartButton" class="action" type="button">Blast Again</button>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const game = document.getElementById("game");
      const scorePill = document.getElementById("scorePill");
      const scoreEl = document.getElementById("score");
      const crownsEl = document.getElementById("crowns");
      const toastEl = document.getElementById("toast");
      const startPanel = document.getElementById("startPanel");
      const gameOverPanel = document.getElementById("gameOverPanel");
      const finalScoreEl = document.getElementById("finalScore");
      const startHighScoreEl = document.getElementById("startHighScore");
      const finalHighScoreEl = document.getElementById("finalHighScore");
      const gameOverMessage = document.getElementById("gameOverMessage");
      const muteButton = document.getElementById("mute");

      let pickles = [];
      let score = 0;
      let crowns = 3;
      let running = false;
      let startTime = 0;
      let lastTime = 0;
      let nextSpawn = 0;
      let animationId = 0;
      let audioContext = null;
      let muted = false;
      let lastGiantAt = -20000;
      let highScore = loadHighScore();
      let recoveryPoints = 0;
      let sweetThreshold = 500;
      let sweetPending = false;
      let sweetActive = false;
      let newRecordThisRun = false;
      let recordFlashTimer = 0;
      let jakeyPending = false;
      let jakeyActive = false;
      let jakeySiren = null;
      let barrelPending = false;
      let barrelActive = false;
      let barrelSound = null;

      const cheers = ["DILL-IGHTFUL!", "CRUNCH-TASTIC!", "BRINE WORK!", "PICKLE POWER!", "JAR-DROPPING!"];
      const bonks = ["BONK!", "PLOP!", "OH, DILL!"];

      function loadHighScore() {
        try {
          const savedScore = Number.parseInt(localStorage.getItem("pickleBlasterHighScore"), 10);
          return Number.isFinite(savedScore) && savedScore > 0 ? savedScore : 0;
        } catch (_) {
          return 0;
        }
      }

      function saveHighScore() {
        try {
          localStorage.setItem("pickleBlasterHighScore", String(highScore));
        } catch (_) {}
      }

      function updateHighScoreDisplays(isNewRecord = false) {
        startHighScoreEl.textContent = `High Score: ${highScore}`;
        finalHighScoreEl.textContent = isNewRecord ? `New High Score: ${highScore}!` : `High Score: ${highScore}`;
        finalHighScoreEl.classList.toggle("new-record", isNewRecord);
      }

      function updateCrowns() {
        crownsEl.innerHTML = "";
        for (let i = 0; i < 3; i++) {
          const crown = document.createElement("span");
          crown.textContent = "♛";
          if (i >= crowns) crown.className = "lost";
          crownsEl.appendChild(crown);
        }
        crownsEl.setAttribute("aria-label", `${crowns} crown${crowns === 1 ? "" : "s"} remaining`);
      }

      function beginRecoveryCycle() {
        recoveryPoints = 0;
        sweetPending = false;
        sweetActive = false;
      }

      function loseCrown(message) {
        const hadCrowns = crowns > 0;
        if (crowns > 0) {
          crowns--;
          updateCrowns();
        }
        if (hadCrowns && crowns === 0) beginRecoveryCycle();
        showToast(message || (crowns ? `${crowns} CROWN${crowns === 1 ? "" : "S"} LEFT!` : "NO CROWNS LEFT!"));
        game.animate(
          [{ transform: "translateX(0)" }, { transform: "translateX(-7px)" },
           { transform: "translateX(7px)" }, { transform: "translateX(0)" }],
          { duration: 180 }
        );
      }

      function sound(kind) {
        if (muted) return;
        try {
          audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
          const now = audioContext.currentTime;
          const oscillator = audioContext.createOscillator();
          const gain = audioContext.createGain();
          oscillator.connect(gain);
          gain.connect(audioContext.destination);
          oscillator.type = kind === "bonk" ? "sawtooth" : kind === "explosion" ? "triangle" : "square";
          oscillator.frequency.setValueAtTime(kind === "bonk" ? 130 : kind === "explosion" ? 210 : 470, now);
          oscillator.frequency.exponentialRampToValueAtTime(kind === "bonk" ? 65 : kind === "explosion" ? 45 : 820, now + .1);
          gain.gain.setValueAtTime(.055, now);
          gain.gain.exponentialRampToValueAtTime(.001, now + .13);
          oscillator.start(now);
          oscillator.stop(now + .14);
        } catch (_) {}
      }

      function spicyExplosionSound() {
        if (muted) return;
        try {
          audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
          const now = audioContext.currentTime;
          const master = audioContext.createGain();
          const compressor = audioContext.createDynamicsCompressor();
          master.connect(compressor);
          compressor.connect(audioContext.destination);
          master.gain.setValueAtTime(.28, now);
          master.gain.exponentialRampToValueAtTime(.001, now + 1.25);

          const boom = audioContext.createOscillator();
          const boomGain = audioContext.createGain();
          boom.type = "sine";
          boom.frequency.setValueAtTime(105, now);
          boom.frequency.exponentialRampToValueAtTime(28, now + .65);
          boomGain.gain.setValueAtTime(.8, now);
          boomGain.gain.exponentialRampToValueAtTime(.001, now + .9);
          boom.connect(boomGain);
          boomGain.connect(master);
          boom.start(now);
          boom.stop(now + .95);

          const rumble = audioContext.createOscillator();
          const rumbleGain = audioContext.createGain();
          rumble.type = "sawtooth";
          rumble.frequency.setValueAtTime(52, now + .08);
          rumble.frequency.exponentialRampToValueAtTime(24, now + 1.15);
          rumbleGain.gain.setValueAtTime(.001, now);
          rumbleGain.gain.linearRampToValueAtTime(.25, now + .12);
          rumbleGain.gain.exponentialRampToValueAtTime(.001, now + 1.2);
          rumble.connect(rumbleGain);
          rumbleGain.connect(master);
          rumble.start(now);
          rumble.stop(now + 1.22);

          const noiseLength = Math.floor(audioContext.sampleRate * .7);
          const noiseBuffer = audioContext.createBuffer(1, noiseLength, audioContext.sampleRate);
          const noiseData = noiseBuffer.getChannelData(0);
          for (let i = 0; i < noiseLength; i++) {
            noiseData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / noiseLength, 2);
          }
          const noise = audioContext.createBufferSource();
          const noiseFilter = audioContext.createBiquadFilter();
          const noiseGain = audioContext.createGain();
          noise.buffer = noiseBuffer;
          noiseFilter.type = "lowpass";
          noiseFilter.frequency.setValueAtTime(950, now);
          noiseFilter.frequency.exponentialRampToValueAtTime(110, now + .7);
          noiseGain.gain.setValueAtTime(.55, now);
          noiseGain.gain.exponentialRampToValueAtTime(.001, now + .72);
          noise.connect(noiseFilter);
          noiseFilter.connect(noiseGain);
          noiseGain.connect(master);
          noise.start(now);
        } catch (_) {}
      }

      function happySound(delay = 0) {
        if (muted) return;
        try {
          audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
          const now = audioContext.currentTime + delay;
          const notes = [523.25, 659.25, 783.99, 1046.5];
          notes.forEach((frequency, index) => {
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            const start = now + index * .08;
            oscillator.type = "triangle";
            oscillator.frequency.setValueAtTime(frequency, start);
            gain.gain.setValueAtTime(.001, start);
            gain.gain.linearRampToValueAtTime(.09, start + .015);
            gain.gain.exponentialRampToValueAtTime(.001, start + .24);
            oscillator.connect(gain);
            gain.connect(audioContext.destination);
            oscillator.start(start);
            oscillator.stop(start + .25);
          });
        } catch (_) {}
      }

      function startJakeySiren() {
        if (muted || jakeySiren) return;
        try {
          audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
          const now = audioContext.currentTime;
          const oscillator = audioContext.createOscillator();
          const gain = audioContext.createGain();
          oscillator.type = "square";
          for (let i = 0; i < 1200; i++) {
            oscillator.frequency.setValueAtTime(i % 2 ? 520 : 880, now + i * .22);
          }
          gain.gain.setValueAtTime(.035, now);
          oscillator.connect(gain);
          gain.connect(audioContext.destination);
          oscillator.start(now);
          jakeySiren = { oscillator, gain };
        } catch (_) {}
      }

      function stopJakeySiren() {
        if (!jakeySiren) return;
        try {
          const now = audioContext.currentTime;
          jakeySiren.gain.gain.cancelScheduledValues(now);
          jakeySiren.gain.gain.setValueAtTime(jakeySiren.gain.gain.value || .035, now);
          jakeySiren.gain.gain.exponentialRampToValueAtTime(.001, now + .08);
          jakeySiren.oscillator.stop(now + .09);
        } catch (_) {}
        jakeySiren = null;
      }

      function finishJakey() {
        jakeyActive = false;
        stopJakeySiren();
      }

      function startBarrelSound() {
        if (muted || barrelSound) return;
        try {
          audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
          const now = audioContext.currentTime;
          const oscillator = audioContext.createOscillator();
          const gain = audioContext.createGain();
          const filter = audioContext.createBiquadFilter();
          oscillator.type = "sawtooth";
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(420, now);
          for (let i = 0; i < 900; i++) {
            const t = now + i * .18;
            oscillator.frequency.setValueAtTime(i % 2 ? 74 : 96, t);
            filter.frequency.setValueAtTime(i % 2 ? 300 : 520, t);
          }
          gain.gain.setValueAtTime(.045, now);
          oscillator.connect(filter);
          filter.connect(gain);
          gain.connect(audioContext.destination);
          oscillator.start(now);
          barrelSound = { oscillator, gain };
        } catch (_) {}
      }

      function stopBarrelSound() {
        if (!barrelSound) return;
        try {
          const now = audioContext.currentTime;
          barrelSound.gain.gain.cancelScheduledValues(now);
          barrelSound.gain.gain.setValueAtTime(barrelSound.gain.gain.value || .045, now);
          barrelSound.gain.gain.exponentialRampToValueAtTime(.001, now + .1);
          barrelSound.oscillator.stop(now + .11);
        } catch (_) {}
        barrelSound = null;
      }

      function finishBarrel() {
        barrelActive = false;
        stopBarrelSound();
      }

      function barrelPopSound() {
        if (muted) return;
        try {
          audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
          const now = audioContext.currentTime;
          const master = audioContext.createGain();
          master.connect(audioContext.destination);
          master.gain.setValueAtTime(.22, now);
          master.gain.exponentialRampToValueAtTime(.001, now + .9);

          const thump = audioContext.createOscillator();
          const thumpGain = audioContext.createGain();
          thump.type = "sine";
          thump.frequency.setValueAtTime(72, now);
          thump.frequency.exponentialRampToValueAtTime(38, now + .28);
          thumpGain.gain.setValueAtTime(.8, now);
          thumpGain.gain.exponentialRampToValueAtTime(.001, now + .45);
          thump.connect(thumpGain);
          thumpGain.connect(master);
          thump.start(now);
          thump.stop(now + .5);

          [196, 246.94, 293.66, 392].forEach((frequency, index) => {
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            const start = now + .12 + index * .075;
            oscillator.type = "square";
            oscillator.frequency.setValueAtTime(frequency, start);
            gain.gain.setValueAtTime(.001, start);
            gain.gain.linearRampToValueAtTime(.12, start + .02);
            gain.gain.exponentialRampToValueAtTime(.001, start + .32);
            oscillator.connect(gain);
            gain.connect(master);
            oscillator.start(start);
            oscillator.stop(start + .34);
          });
        } catch (_) {}
      }

      function showToast(message) {
        toastEl.textContent = message;
        toastEl.classList.remove("show");
        void toastEl.offsetWidth;
        toastEl.classList.add("show");
      }

      function makeSplat(x, y, text = "POP!") {
        const splat = document.createElement("div");
        splat.className = "splat";
        splat.style.left = `${x}px`;
        splat.style.top = `${y}px`;
        splat.innerHTML = `<b>${text}</b>`;
        game.appendChild(splat);
        setTimeout(() => splat.remove(), 500);
      }

      function addScore(points) {
        score += points;
        scoreEl.textContent = score;
        if (score > 0 && score > highScore) {
          highScore = score;
          saveHighScore();
          startHighScoreEl.textContent = `High Score: ${highScore}`;
          if (!newRecordThisRun) {
            newRecordThisRun = true;
            scorePill.classList.add("record-flash");
            clearTimeout(recordFlashTimer);
            recordFlashTimer = setTimeout(() => scorePill.classList.remove("record-flash"), 3000);
            happySound();
            happySound(.55);
          }
        }
        if (crowns === 0 && !sweetPending && !sweetActive) {
          recoveryPoints += points;
          if (recoveryPoints >= sweetThreshold) {
            sweetPending = true;
            showToast("SWEET PICKLE INCOMING!");
          }
        }
      }

      function spawnPickle(elapsed, forcedSpecial = "") {
        const level = Math.min(1.8, elapsed / 60000);
        const jakey = forcedSpecial === "jakey";
        const barrel = forcedSpecial === "barrel";
        const sweet = !jakey && !barrel && sweetPending;
        const bigDavid = !jakey && !barrel && !sweet && Math.random() < .009;
        const fusePickle = !jakey && !barrel && !sweet && !bigDavid && elapsed > 7000 && Math.random() < .0175;
        const giantChance = !jakey && !barrel && !sweet && !bigDavid && !fusePickle && elapsed > 9000 && elapsed - lastGiantAt > 12000 && Math.random() < .11;
        const giant = giantChance;
        const friendly = !jakey && !barrel && !sweet && !bigDavid && !fusePickle && !giant && elapsed > 4000 && Math.random() < .06;
        const rascal = !jakey && !barrel && !sweet && !bigDavid && !fusePickle && !giant && !friendly && elapsed > 5000 && Math.random() < .09;
        if (giant) lastGiantAt = elapsed;
        if (sweet) {
          sweetPending = false;
          sweetActive = true;
          showToast("THE SWEET PICKLE!");
        } else if (bigDavid) {
          showToast("BIG DAVID!");
        } else if (fusePickle) {
          showToast("SPICY PICKLE!");
        } else if (jakey) {
          showToast("JAKEY PICKLE!");
        } else if (barrel) {
          showToast("PICKLE BARREL!");
        }

        const viewportWidth = game.clientWidth;
        let width = barrel
          ? Math.min(viewportWidth * .2, 128)
          : giant || bigDavid
          ? Math.min(viewportWidth * .3, 175)
          : 38 + Math.random() * Math.min(54, viewportWidth * .09);
        width = Math.max(36, width);

        const el = document.createElement("div");
        const mouth = document.createElement("span");
        el.className = `pickle${giant || bigDavid ? " giant" : ""}${bigDavid ? " big-david" : ""}${rascal ? " rascal" : ""}${friendly ? " friendly" : ""}${sweet ? " sweet" : ""}${fusePickle ? " fuse-pickle" : ""}${jakey ? " jakey" : ""}${barrel ? " barrel" : ""}`;
        mouth.className = "mouth";
        el.appendChild(mouth);
        if (friendly || sweet) {
          const crown = document.createElement("span");
          crown.className = "friendly-crown";
          crown.textContent = "♛";
          el.appendChild(crown);
        }
        if (fusePickle) {
          const fuse = document.createElement("span");
          fuse.className = "fuse";
          el.appendChild(fuse);
        }
        if (bigDavid) {
          const sunglasses = document.createElement("span");
          sunglasses.className = "sunglasses";
          el.appendChild(sunglasses);
        }
        if (jakey) {
          const light = document.createElement("span");
          light.className = "jakey-light";
          el.appendChild(light);
        }
        if (barrel) {
          ["top", "middle", "bottom"].forEach(position => {
            const band = document.createElement("span");
            band.className = `barrel-band ${position}`;
            el.appendChild(band);
          });
          const label = document.createElement("span");
          label.className = "barrel-label";
          label.textContent = "DILL";
          el.appendChild(label);
        }

        const maxHp = barrel ? 20 : bigDavid ? 10 : giant ? Math.max(3, Math.round(width / 38)) : 1;
        if (giant) {
          showToast("GIANT GHERKIN!");
        }

        el.style.setProperty("--w", `${width}px`);
        const margin = 8;
        const x = margin + Math.random() * Math.max(1, viewportWidth - width - margin * 2);
        const baseSpeed = 52 + (92 - Math.min(width, 92)) * .8;
        const speed = (barrel ? 28 : jakey ? baseSpeed * 1.75 : giant || bigDavid ? 34 : baseSpeed) * (1 + level * .55);
        const pickle = {
          el, x, y: -width * 1.9, width, initialWidth: width, speed,
          rot: Math.random() * 26 - 13,
          spin: (Math.random() * 42 - 21) * (giant || bigDavid ? .35 : 1),
          hp: maxHp, maxHp, giant, bigDavid, rascal, friendly, sweet, fusePickle, jakey, barrel,
          carriedPoints: jakey ? 25 : 0,
          storedPoints: 0,
          zigDirection: Math.random() < .5 ? -1 : 1,
          zigSpeed: 75 + Math.random() * 60,
          nextZig: performance.now() + 180 + Math.random() * 320,
          tongueOut: false,
          nextTongue: performance.now() + 800 + Math.random() * 1800,
          tongueUntil: 0, alive: true
        };

        el.style.setProperty("--x", `${x}px`);
        el.style.setProperty("--y", `${pickle.y}px`);
        el.style.setProperty("--rot", `${pickle.rot}deg`);
        el.addEventListener("pointerdown", event => blast(event, pickle));
        game.appendChild(el);
        pickles.push(pickle);
      }

      function picklePoints(pickle) {
        return pickle.jakey
          ? pickle.carriedPoints
          : pickle.giant || pickle.bigDavid
          ? 25 + pickle.maxHp * 3
          : Math.max(5, Math.round(12 - pickle.width / 12));
      }

      function collectJakeyTargets(jakey) {
        const jakeyX = jakey.x + jakey.width / 2;
        const jakeyY = jakey.y + jakey.width * .875;
        for (const target of pickles) {
          if (!target.alive || target === jakey || target.friendly || target.sweet || target.barrel) continue;
          const targetX = target.x + target.width / 2;
          const targetY = target.y + target.width * .875;
          const overlapsX = Math.abs(targetX - jakeyX) < (jakey.width + target.width) * .42;
          const overlapsY = Math.abs(targetY - jakeyY) < (jakey.width + target.width) * .72;
          if (!overlapsX || !overlapsY) continue;

          target.alive = false;
          target.el.remove();
          jakey.carriedPoints += picklePoints(target);
          makeSplat(targetX, targetY, "ZAP!");
          sound("blast");
        }
      }

      function collectBarrelTargets(barrel) {
        const barrelX = barrel.x + barrel.width / 2;
        const barrelY = barrel.y + barrel.width * .875;
        const radius = Math.max(135, barrel.width * 1.55);
        for (const target of pickles) {
          if (!target.alive || target === barrel || target.barrel) continue;
          const targetX = target.x + target.width / 2;
          const targetY = target.y + target.width * .875;
          if (Math.hypot(targetX - barrelX, targetY - barrelY) > radius) continue;

          target.alive = false;
          target.el.remove();
          if (target.jakey) finishJakey();
          if (target.sweet) sweetActive = false;
          barrel.storedPoints += target.friendly ? 25 : picklePoints(target);
          makeSplat(targetX, targetY, "SLURP!");
          sound("blast");
        }
      }

      function explodePickle(source) {
        const centerX = source.x + source.width / 2;
        const centerY = source.y + source.width * .875;
        const radius = Math.min(240, Math.max(145, game.clientWidth * .24));
        const ring = document.createElement("div");
        sound("explosion");
        ring.className = "blast-ring";
        ring.style.left = `${centerX}px`;
        ring.style.top = `${centerY}px`;
        ring.style.setProperty("--blast-diameter", `${radius * 2}px`);
        game.appendChild(ring);
        setTimeout(() => ring.remove(), 550);

        let blasted = 0;
        let friendlyBlasted = 0;
        for (const pickle of pickles) {
          if (!pickle.alive || pickle === source) continue;
          const pickleX = pickle.x + pickle.width / 2;
          const pickleY = pickle.y + pickle.width * .875;
          if (Math.hypot(pickleX - centerX, pickleY - centerY) <= radius) {
            if (pickle.barrel) continue;
            pickle.alive = false;
            pickle.el.remove();
            if (pickle.jakey) finishJakey();
            if (pickle.friendly || pickle.sweet) {
              makeSplat(pickleX, pickleY, "OOPS!");
              if (pickle.sweet) sweetActive = false;
              if (crowns === 0) {
                showToast(pickle.sweet ? "SWEET PICKLE BLASTED!" : "ROYAL PICKLE BLASTED!");
                endGame();
                return;
              }
              loseCrown(pickle.sweet ? "OH NO! SWEET PICKLE!" : "THE ROYAL PICKLE!");
              friendlyBlasted++;
            } else {
              addScore(picklePoints(pickle));
              makeSplat(pickleX, pickleY, "BOOM!");
              blasted++;
            }
          }
        }
        addScore(picklePoints(source));
        showToast(
          friendlyBlasted
            ? "OH NO! ROYAL PICKLE!"
            : blasted ? `BRINE BLAST x${blasted + 1}!` : "BRINE BLAST!"
        );
        game.animate(
          [{ transform: "scale(1)" }, { transform: "scale(1.018)" }, { transform: "scale(1)" }],
          { duration: 220 }
        );
      }

      function detonateFusePickle(source) {
        const centerX = source.x + source.width / 2;
        const centerY = source.y + source.width * .875;
        const ring = document.createElement("div");
        ring.className = "blast-ring";
        ring.style.left = `${centerX}px`;
        ring.style.top = `${centerY}px`;
        ring.style.setProperty(
          "--blast-diameter",
          `${Math.hypot(game.clientWidth, game.clientHeight) * 2}px`
        );
        game.appendChild(ring);
        setTimeout(() => ring.remove(), 550);
        spicyExplosionSound();

        let blasted = 0;
        for (const target of pickles) {
          if (!target.alive || target === source) continue;
          const isCrowned = target.friendly || target.sweet;
          if (!isCrowned && !target.fusePickle && !target.barrel) {
            const targetX = target.x + target.width / 2;
            const targetY = target.y + target.width * .875;
            target.alive = false;
            target.el.remove();
            if (target.jakey) finishJakey();
            addScore(picklePoints(target));
            makeSplat(targetX, targetY, "POOF!");
            blasted++;
          }
        }

        addScore(picklePoints(source));
        const blastName = source.bigDavid ? "BIG DAVID BLAST" : "SPICY BLAST";
        const earnedBigDCrown = source.bigDavid && blasted >= 10 && crowns < 3;
        if (earnedBigDCrown) {
          crowns++;
          updateCrowns();
          happySound();
          showToast("BIG D CROWN!");
        } else {
          showToast(blasted ? `${blastName} x${blasted + 1}!` : `${blastName}!`);
        }
        game.animate(
          [
            { filter: "brightness(1)", transform: "scale(1)" },
            { filter: "brightness(1.8)", transform: "scale(1.025)" },
            { filter: "brightness(1)", transform: "scale(1)" }
          ],
          { duration: 300 }
        );
      }

      function blast(event, pickle) {
        event.preventDefault();
        event.stopPropagation();
        if (!running || !pickle.alive) return;

        if (pickle.jakey) {
          const jakeyRect = pickle.el.getBoundingClientRect();
          pickle.alive = false;
          pickle.el.remove();
          finishJakey();
          sound("blast");
          makeSplat(
            event.clientX || jakeyRect.left + jakeyRect.width / 2,
            event.clientY || jakeyRect.top + jakeyRect.height / 2,
            `+${pickle.carriedPoints}`
          );
          addScore(pickle.carriedPoints);
          showToast(`JAKEY JACKPOT +${pickle.carriedPoints}!`);
          return;
        }

        if (pickle.barrel) {
          pickle.hp--;
          sound("blast");
          makeSplat(event.clientX, event.clientY, pickle.hp ? `${pickle.hp}!` : "BARREL!");
          if (pickle.hp > 0) {
            const centerX = pickle.x + pickle.width / 2;
            const centerY = pickle.y + pickle.width * .875;
            const remaining = pickle.hp / pickle.maxHp;
            pickle.width = pickle.initialWidth * (.62 + remaining * .38);
            pickle.x = centerX - pickle.width / 2;
            pickle.y = centerY - pickle.width * .875;
            pickle.el.style.setProperty("--w", `${pickle.width}px`);
            pickle.el.style.setProperty("--x", `${pickle.x}px`);
            pickle.el.style.setProperty("--y", `${pickle.y}px`);
            pickle.el.animate(
              [{ transform: `translate3d(${pickle.x}px, ${pickle.y}px, 0) rotate(${pickle.rot}deg) scale(1)` },
               { transform: `translate3d(${pickle.x}px, ${pickle.y}px, 0) rotate(${pickle.rot + 7}deg) scale(.92)` },
               { transform: `translate3d(${pickle.x}px, ${pickle.y}px, 0) rotate(${pickle.rot}deg) scale(1)` }],
              { duration: 130 }
            );
          } else {
            pickle.alive = false;
            pickle.el.remove();
            finishBarrel();
            barrelPopSound();
            addScore(pickle.storedPoints);
            showToast(`BARREL BONUS +${pickle.storedPoints}!`);
          }
          return;
        }

        if (pickle.fusePickle) {
          const fuseRect = pickle.el.getBoundingClientRect();
          pickle.alive = false;
          pickle.el.remove();
          makeSplat(
            event.clientX || fuseRect.left + fuseRect.width / 2,
            event.clientY || fuseRect.top + fuseRect.height / 2,
            "KABOOM!"
          );
          detonateFusePickle(pickle);
          return;
        }

        if (pickle.friendly || pickle.sweet) {
          const friendlyRect = pickle.el.getBoundingClientRect();
          pickle.alive = false;
          pickle.el.remove();
          if (pickle.sweet) sweetActive = false;
          sound("bonk");
          makeSplat(
            event.clientX || friendlyRect.left + friendlyRect.width / 2,
            event.clientY || friendlyRect.top + friendlyRect.height / 2,
            "OOPS!"
          );
          if (crowns === 0) {
            showToast(pickle.sweet ? "SWEET PICKLE BLASTED!" : "ROYAL PICKLE BLASTED!");
            endGame();
          } else {
            loseCrown(pickle.sweet ? "OH NO! SWEET PICKLE!" : "OH NO! FRIENDLY PICKLE!");
          }
          return;
        }

        const willExplode = pickle.rascal && pickle.tongueOut && pickle.hp === 1;
        const willMightyBlast = pickle.bigDavid && pickle.hp === 1;
        pickle.hp--;
        sound("blast");
        const rect = pickle.el.getBoundingClientRect();
        makeSplat(
          event.clientX || rect.left + rect.width / 2,
          event.clientY || rect.top + rect.height / 2,
          pickle.hp ? `${pickle.hp}!` : willExplode || willMightyBlast ? "KABOOM!" : "POP!"
        );

        if (pickle.hp > 0) {
          if (pickle.giant || pickle.bigDavid) {
            const centerX = pickle.x + pickle.width / 2;
            const centerY = pickle.y + pickle.width * .875;
            const remaining = pickle.hp / pickle.maxHp;
            pickle.width = pickle.initialWidth * (.55 + remaining * .45);
            pickle.x = centerX - pickle.width / 2;
            pickle.y = centerY - pickle.width * .875;
            pickle.el.style.setProperty("--w", `${pickle.width}px`);
            pickle.el.style.setProperty("--x", `${pickle.x}px`);
            pickle.el.style.setProperty("--y", `${pickle.y}px`);
          }
          pickle.el.animate(
            [{ transform: `translate3d(${pickle.x}px, ${pickle.y}px, 0) rotate(${pickle.rot}deg) scale(1)` },
             { transform: `translate3d(${pickle.x}px, ${pickle.y}px, 0) rotate(${pickle.rot - 8}deg) scale(.9)` },
             { transform: `translate3d(${pickle.x}px, ${pickle.y}px, 0) rotate(${pickle.rot}deg) scale(1)` }],
            { duration: 130 }
          );
          addScore(2);
        } else {
          pickle.alive = false;
          pickle.el.remove();
          if (willMightyBlast) {
            detonateFusePickle(pickle);
          } else if (willExplode) {
            explodePickle(pickle);
          } else {
            addScore(picklePoints(pickle));
          }
          if (pickle.giant) showToast("HUGE DILL!");
          else if (!willExplode && !willMightyBlast && score > 0 && score % 50 < 10) showToast(cheers[Math.floor(Math.random() * cheers.length)]);
        }
        scoreEl.textContent = score;
      }

      function groundImpact(pickle) {
        pickle.alive = false;
        pickle.el.remove();
        if (pickle.jakey) finishJakey();
        if (pickle.barrel) finishBarrel();
        if (pickle.sweet) {
          sweetActive = false;
          crowns = Math.min(3, crowns + 1);
          updateCrowns();
          recoveryPoints = 0;
          sweetThreshold *= 2;
          showToast("A CROWN RESTORED!");
          sound("blast");
          return;
        }
        if (pickle.friendly) {
          addScore(25);
          happySound();
          showToast("ROYAL PICKLE +25!");
          return;
        }
        if (pickle.fusePickle) {
          showToast("SPICY PICKLE FIZZLED!");
          return;
        }
        sound("bonk");

        const bump = document.createElement("div");
        bump.className = "ground-bump";
        bump.style.left = `${pickle.x + pickle.width / 2}px`;
        bump.textContent = bonks[Math.floor(Math.random() * bonks.length)];
        game.appendChild(bump);
        setTimeout(() => bump.remove(), 700);

        if (crowns > 0) {
          loseCrown();
        } else {
          endGame();
        }
      }

      function frame(time) {
        if (!running) return;
        const dt = Math.min(34, time - lastTime) / 1000;
        const elapsed = time - startTime;
        lastTime = time;
        const groundRise = Math.min(game.clientHeight * .18, elapsed / 5500);
        game.style.setProperty("--ground-rise", `${groundRise}px`);

        if (time >= nextSpawn) {
          if (barrelPending) {
            barrelPending = false;
            barrelActive = true;
            spawnPickle(elapsed, "barrel");
            const ramp = Math.min(650, elapsed / 75);
            nextSpawn = time + Math.max(330, 1040 - ramp) * (.75 + Math.random() * .5);
          } else if (jakeyPending) {
            jakeyPending = false;
            jakeyActive = true;
            spawnPickle(elapsed, "jakey");
            const ramp = Math.min(650, elapsed / 75);
            nextSpawn = time + Math.max(330, 1040 - ramp) * (.75 + Math.random() * .5);
          } else if (!sweetPending && !jakeyActive && !barrelActive) {
            const rareRoll = Math.random();
            if (rareRoll < .009) {
              jakeyPending = true;
              startJakeySiren();
              showToast("JAKEY INCOMING!");
              nextSpawn = time + 2000;
            } else if (rareRoll < .018) {
              barrelPending = true;
              startBarrelSound();
              showToast("BARREL RUMBLE!");
              nextSpawn = time + 2000;
            } else {
              spawnPickle(elapsed);
              const ramp = Math.min(650, elapsed / 75);
              nextSpawn = time + Math.max(330, 1040 - ramp) * (.75 + Math.random() * .5);
            }
          } else {
            spawnPickle(elapsed);
            const ramp = Math.min(650, elapsed / 75);
            nextSpawn = time + Math.max(330, 1040 - ramp) * (.75 + Math.random() * .5);
          }
        }

        const ground = game.clientHeight - 40 - groundRise;
        for (const pickle of pickles) {
          if (!pickle.alive) continue;
          if (pickle.rascal) {
            if (!pickle.tongueOut && time >= pickle.nextTongue) {
              pickle.tongueOut = true;
              pickle.tongueUntil = time + 700 + Math.random() * 650;
              pickle.el.classList.add("tongue-out");
            } else if (pickle.tongueOut && time >= pickle.tongueUntil) {
              pickle.tongueOut = false;
              pickle.nextTongue = time + 1200 + Math.random() * 2400;
              pickle.el.classList.remove("tongue-out");
            }
          }
          if (pickle.jakey) {
            if (time >= pickle.nextZig) {
              pickle.zigDirection = Math.random() < .5 ? -1 : 1;
              pickle.zigSpeed = 75 + Math.random() * 75;
              pickle.nextZig = time + 180 + Math.random() * 380;
            }
            pickle.x += pickle.zigDirection * pickle.zigSpeed * dt;
            if (pickle.x <= 4 || pickle.x + pickle.width >= game.clientWidth - 4) {
              pickle.x = Math.max(4, Math.min(game.clientWidth - pickle.width - 4, pickle.x));
              pickle.zigDirection *= -1;
              pickle.nextZig = time + 180 + Math.random() * 260;
            }
            pickle.el.style.setProperty("--x", `${pickle.x}px`);
          }
          pickle.y += pickle.speed * dt;
          pickle.rot += pickle.spin * dt;
          pickle.el.style.setProperty("--y", `${pickle.y}px`);
          pickle.el.style.setProperty("--rot", `${pickle.rot}deg`);
          if (pickle.jakey) collectJakeyTargets(pickle);
          if (pickle.barrel) collectBarrelTargets(pickle);
          if (pickle.y + pickle.width * 1.75 >= ground) groundImpact(pickle);
        }
        pickles = pickles.filter(pickle => pickle.alive);
        animationId = requestAnimationFrame(frame);
      }

      function clearPickles() {
        stopJakeySiren();
        stopBarrelSound();
        jakeyPending = false;
        jakeyActive = false;
        barrelPending = false;
        barrelActive = false;
        pickles.forEach(pickle => pickle.el.remove());
        pickles = [];
        game.querySelectorAll(".splat, .ground-bump, .blast-ring").forEach(el => el.remove());
      }

      function startGame() {
        cancelAnimationFrame(animationId);
        clearPickles();
        score = 0;
        crowns = 3;
        recoveryPoints = 0;
        sweetThreshold = 500;
        sweetPending = false;
        sweetActive = false;
        newRecordThisRun = false;
        finalHighScoreEl.classList.remove("new-record");
        scorePill.classList.remove("record-flash");
        clearTimeout(recordFlashTimer);
        lastGiantAt = -20000;
        scoreEl.textContent = "0";
        game.style.setProperty("--ground-rise", "0px");
        updateCrowns();
        startPanel.classList.add("hidden");
        gameOverPanel.classList.add("hidden");
        running = true;
        startTime = performance.now();
        lastTime = startTime;
        nextSpawn = startTime + 420;
        animationId = requestAnimationFrame(frame);
      }

      function endGame() {
        running = false;
        stopJakeySiren();
        stopBarrelSound();
        jakeyPending = false;
        jakeyActive = false;
        barrelPending = false;
        barrelActive = false;
        cancelAnimationFrame(animationId);
        const isNewRecord = newRecordThisRun && score > 0;
        updateHighScoreDisplays(isNewRecord);
        finalScoreEl.textContent = `${score} point${score === 1 ? "" : "s"}`;
        const messages = score < 40
          ? ["The pickles formed a tiny green uprising.", "The royal picnic got extra crunchy."]
          : score < 120
            ? ["A noble effort! The dill was strong today.", "You blasted bravely, Pickle Pal!"]
            : ["Legend says the jars still fear your name.", "A truly brine-boggling performance!"];
        gameOverMessage.textContent = messages[Math.floor(Math.random() * messages.length)];
        if (isNewRecord) {
          setTimeout(() => finalHighScoreEl.classList.remove("new-record"), 3000);
        }
        setTimeout(() => gameOverPanel.classList.remove("hidden"), 300);
      }

      document.getElementById("startButton").addEventListener("click", startGame);
      document.getElementById("restartButton").addEventListener("click", startGame);
      muteButton.addEventListener("click", () => {
        muted = !muted;
        if (muted) {
          stopJakeySiren();
          stopBarrelSound();
        } else if (running) {
          if (jakeyPending || jakeyActive) startJakeySiren();
          if (barrelPending || barrelActive) startBarrelSound();
        }
        muteButton.textContent = muted ? "🔇" : "🔊";
        muteButton.setAttribute("aria-label", muted ? "Unmute sound" : "Mute sound");
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden && running) {
          lastTime = performance.now();
          stopJakeySiren();
          stopBarrelSound();
        } else if (!document.hidden && running) {
          if (jakeyPending || jakeyActive) startJakeySiren();
          if (barrelPending || barrelActive) startBarrelSound();
        }
      });

      let lastTouchEnd = 0;
      game.addEventListener("touchend", event => {
        const now = Date.now();
        if (now - lastTouchEnd < 350) event.preventDefault();
        lastTouchEnd = now;
      }, { passive: false });
      game.addEventListener("dblclick", event => event.preventDefault());
      ["gesturestart", "gesturechange", "gestureend"].forEach(type => {
        game.addEventListener(type, event => event.preventDefault(), { passive: false });
      });

      updateCrowns();
      updateHighScoreDisplays();
    })();
  </script>
</body>
</html>
